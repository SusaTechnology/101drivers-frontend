<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Realistic top-down sedan silhouette, white.
       ViewBox is 64x64 with car ~40x54 centered — 10px padding on each side
       so rotation at any angle never clips the shape. -->
  <defs>
    <filter id="ds" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <g filter="url(#ds)" transform="translate(32,32)">
    <!-- Car centered at origin. Points UP (north). ~20w x 27h -->

    <!-- Shadow on ground -->
    <ellipse cx="0" cy="2" rx="13" ry="24" fill="#000" opacity="0.08"/>

    <!-- Main body shape — realistic sedan profile -->
    <path d="
      M -8  -26
      C -8  -27, -7  -27.5, -6  -27.5
      L  6  -27.5
      C  7  -27.5,  8  -27,  8  -26
      L  9.5  -22
      L  11  -17
      C  11.5  -15.5,  11.5  -14,  11  -12.5
      L  10  -8
      L  10   8
      L  11  12.5
      C  11.5  14,  11.5  15.5,  11  17
      L  9.5  22
      L  8   25
      C  8   26,  7   26.5,  6   26.5
      L -6   26.5
      C -7   26.5, -8   26, -8   25
      L -9.5  22
      L -11  17
      C -11.5  15.5, -11.5  14, -11  12.5
      L -10   8
      L -10  -8
      L -11  -12.5
      C -11.5  -14, -11.5  -15.5, -11  -17
      L -9.5  -22
      Z
    " fill="#FFFFFF" stroke="#CCCCCC" stroke-width="0.4"/>

    <!-- Hood (front) -->
    <path d="
      M -7  -26
      L  7  -26
      L  9  -22
      L -9  -22
      Z
    " fill="#F8F8F8"/>

    <!-- Windshield -->
    <path d="
      M -7.5  -21.5
      L -6   -17
      L  6   -17
      L  7.5  -21.5
      Z
    " fill="#64B5F6" opacity="0.85"/>

    <!-- Windshield glare -->
    <path d="
      M -6.5  -21
      L -5.5  -17.5
      L  0   -17.5
      L  0   -21
      Z
    " fill="#FFF" opacity="0.3"/>

    <!-- Roof panel -->
    <rect x="-7" y="-16.5" width="14" height="14" rx="1" fill="#F0F0F0"/>

    <!-- Roof center line (subtle) -->
    <line x1="0" y1="-16" x2="0" y2="-3" stroke="#E0E0E0" stroke-width="0.3"/>

    <!-- Rear window -->
    <path d="
      M -6.5   2.5
      L -7.5   7
      L  7.5   7
      L  6.5   2.5
      Z
    " fill="#64B5F6" opacity="0.6"/>

    <!-- Trunk (rear) -->
    <path d="
      M -7   8
      L  7   8
      L  7.5  10
      L  9   15
      L  9.5  20
      L  8   24
      L -8  24
      L -9.5  20
      L -9   15
      L -7.5  10
      Z
    " fill="#F5F5F5"/>

    <!-- Side mirror left -->
    <ellipse cx="-12" cy="-19" rx="2" ry="1.2" fill="#FFFFFF" stroke="#CCC" stroke-width="0.3"/>
    <!-- Side mirror right -->
    <ellipse cx="12" cy="-19" rx="2" ry="1.2" fill="#FFFFFF" stroke="#CCC" stroke-width="0.3"/>

    <!-- Left headlight -->
    <path d="M -10 -25 L -8.5 -25 L -10 -21.5 Z" fill="#FFD54F" opacity="0.9"/>
    <!-- Right headlight -->
    <path d="M  10 -25 L  8.5 -25 L  10 -21.5 Z" fill="#FFD54F" opacity="0.9"/>

    <!-- Left taillight -->
    <path d="M -10  21.5 L -8.5  24.5 L -10  24.5 Z" fill="#EF5350" opacity="0.9"/>
    <!-- Right taillight -->
    <path d="M  10  21.5 L  8.5  24.5 L  10  24.5 Z" fill="#EF5350" opacity="0.9"/>

    <!-- Front wheel arches -->
    <path d="M -11 -13 C -13 -12, -13 -8, -11 -7" stroke="#BBB" stroke-width="0.5" fill="none"/>
    <path d="M  11 -13 C  13 -12,  13 -8,  11 -7" stroke="#BBB" stroke-width="0.5" fill="none"/>

    <!-- Rear wheel arches -->
    <path d="M -11  7 C -13  8, -13 12, -11 13" stroke="#BBB" stroke-width="0.5" fill="none"/>
    <path d="M  11  7 C  13  8,  13 12,  11 13" stroke="#BBB" stroke-width="0.5" fill="none"/>
  </g>
</svg>